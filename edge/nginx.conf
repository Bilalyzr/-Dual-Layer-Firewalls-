# EPIC D — edge TLS-terminating reverse proxy (TLS 1.3 only).
#
# Terminates HTTPS at the edge with TLS 1.3, redirects HTTP→HTTPS, then forwards
# to the client (dashboard) over the internal docker network. The client's own
# nginx.conf proxies /api to the proxy service internally (HTTP is fine inside
# the trusted docker network).
#
# Mount tls/cert.pem + tls/key.pem (run scripts/gen-certs.sh for local self-signed).

# HTTP → HTTPS redirect.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS (TLS 1.3 only).
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/tls/cert.pem;
    ssl_certificate_key /etc/tls/key.pem;
    ssl_protocols       TLSv1.3;          # PRD §6: TLS 1.3 in transit
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # HSTS so browsers pin HTTPS for a year.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # SSE-friendly proxying to the dashboard client.
    location / {
        proxy_pass http://client:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
