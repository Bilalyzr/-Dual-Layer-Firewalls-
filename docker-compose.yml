# =============================================================================
# Unified Dual-Layer AI Firewall — full stack (Tier 1 MVP)
#
#   mongo   persistence layer (PRD §4 Database Layer)
#   engine  Python processing layer: scikit-learn classifier + biometric scoring
#   proxy   Node.js AI firewall proxy (intercepts prompts, batches telemetry)
#   client  React SecOps dashboard (nginx-served, proxies /api to the proxy)
#
# Usage:  cp .env.example .env  &&  (fill LLM_* if you want real answers)
#         docker compose up --build
#         open http://localhost:5173  (or :8080)
# =============================================================================

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build: ./engine
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      BIOMETRIC_MIN_SAMPLES: ${BIOMETRIC_MIN_SAMPLES:-120}
      BIOMETRIC_Z_THRESHOLD: ${BIOMETRIC_Z_THRESHOLD:-2.5}
    ports:
      - "8011:8011"

  # EPIC E — sandboxed Reader-Agent service. Real isolation: read-only FS,
  # cap_drop ALL, no-new-privileges, non-root, and a SEPARATE egress network
  # (reader_egress) so it can reach ONLY the LLM endpoint — not Mongo/engine.
  # The proxy talks to it via READER_SVC_URL; falls back to in-process otherwise.
  reader-svc:
    build:
      context: .
      dockerfile: reader-svc/Dockerfile
    depends_on:
      - proxy
    environment:
      READER_PORT: "8012"
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    # Hardening (PRD Req 2.1 sandboxing)
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"
    ports:
      - "8012:8012"
    networks:
      - default
      - reader_egress

  proxy:
    build: ./proxy
    depends_on:
      engine:
        condition: service_started
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/firewall
      ENGINE_URL: http://engine:8011
      PROXY_PORT: "4000"
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      STRICT_REAL: ${STRICT_REAL:-true}
      FIREWALL_MODE: ${FIREWALL_MODE:-shadow}
      FIREWALL_THRESHOLD: ${FIREWALL_THRESHOLD:-0.65}
      ADVERSARIAL_SAMPLE_RATE: ${ADVERSARIAL_SAMPLE_RATE:-0.05}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      NOTIFY_SMTP_URL: ${NOTIFY_SMTP_URL:-}
      NOTIFY_EMAIL_TO: ${NOTIFY_EMAIL_TO:-}
      NOTIFY_EMAIL_FROM: ${NOTIFY_EMAIL_FROM:-}
      LOOKUP_API_URL: ${LOOKUP_API_URL:-}
      LOOKUP_API_KEY: ${LOOKUP_API_KEY:-}
      LLAMAGUARD_ENABLED: ${LLAMAGUARD_ENABLED:-false}
      LLAMAGUARD_URL: ${LLAMAGUARD_URL:-}
      LLAMAGUARD_MODEL: ${LLAMAGUARD_MODEL:-meta-llama/llama-guard-4-12b}
      LLAMAGUARD_API_KEY: ${LLAMAGUARD_API_KEY:-}
      BIOMETRIC_MODE: ${BIOMETRIC_MODE:-shadow}
      BIOMETRIC_MIN_SAMPLES: ${BIOMETRIC_MIN_SAMPLES:-120}
      BIOMETRIC_Z_THRESHOLD: ${BIOMETRIC_Z_THRESHOLD:-2.5}
      BIOMETRIC_STEPUP_THRESHOLD: ${BIOMETRIC_STEPUP_THRESHOLD:-50}
      SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-session-secret-change-me}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Dual-Layer AI Firewall}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:8080}
      # EPIC E: route untrusted content to the sandboxed reader service.
      READER_SVC_URL: ${READER_SVC_URL:-http://reader-svc:8012}
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
      args:
        PROXY_URL: http://proxy:4000
    depends_on:
      - proxy
    ports:
      - "8080:80"

  # EPIC D — edge TLS-terminating proxy (TLS 1.3 only, HTTP→HTTPS redirect).
  # Run `bash scripts/gen-certs.sh` first for local self-signed certs. Disabled
  # by default (set ENABLE_TLS=true to enable) so plain-HTTP local dev still works.
  edge:
    image: nginx:1.27-alpine
    profiles: ["tls"]
    depends_on:
      - client
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tls:/etc/tls:ro

volumes:
  mongo-data:

networks:
  # reader-svc joins BOTH `default` (so the proxy can reach it) and the isolated
  # `reader_egress` network. Crucially, Mongo + engine are ONLY on `default` —
  # they are NOT on `reader_egress`, so reader-svc cannot open a socket to them
  # even if a prompt compromise attempted it. reader-svc's only reachable
  # services are: the proxy (inbound) and external internet (LLM endpoint).
  reader_egress:
    driver: bridge
