name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  proxy:
    name: Proxy (Node) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: proxy/package-lock.json
      - name: Install proxy deps
        run: npm ci
        working-directory: proxy
      - name: Run proxy tests (vitest)
        run: npm test
        working-directory: proxy

  engine:
    name: Engine (Python) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install engine deps
        run: pip install -r engine/requirements.txt
      - name: Run engine tests (pytest)
        # Trained model artifacts are committed under engine/models/, so tests
        # run without a separate training step.
        run: python -m pytest engine/tests/ -q
